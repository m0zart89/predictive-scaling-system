name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-python:
    name: Lint Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff==0.4.4

      - name: Lint serving/
        run: ruff check serving/

  test-serving:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint-python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r serving/requirements.txt pytest httpx pytest-timeout

      - name: Run tests
        run: pytest tests/ -v --timeout=30
        env:
          # Fast-fail MLflow connection attempts during tests (no live MLflow server in CI)
          MLFLOW_HTTP_REQUEST_TIMEOUT: "3"
          MLFLOW_TRACKING_URI: "http://127.0.0.1:1"

  build-image:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: lint-python
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./serving
          push: false
          tags: forecast-serving:${{ github.sha }}
          # Layer cache via GitHub Actions cache backend
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm-lint:
    name: Helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: "3.14.4"

      - name: Lint Helm chart
        run: helm lint helm/forecast-serving/

      - name: Helm template (dry-run)
        run: |
          helm template forecast-serving helm/forecast-serving/ \
            --set image.tag=ci-${{ github.sha }} \
            --debug

  # Placeholder job — shows the intended CD path without implementing it
  # In a real cluster, this would use ArgoCD image updater or a Helm upgrade action.
  deploy-check:
    name: Deployment readiness check
    runs-on: ubuntu-latest
    needs: [build-image, helm-lint]
    steps:
      - name: All checks passed
        run: echo "Image built and Helm chart validated. Ready for deployment."
