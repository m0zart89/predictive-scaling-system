apiVersion: apps/v1
kind: Deployment
metadata:
  name: cpu-serving
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cpu-serving
  template:
    metadata:
      labels:
        app: cpu-serving
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: cpu-serving
          image: cpu-serving:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow:5000"
            - name: MODEL_NAME
              value: "cpu-forecasting"
            - name: MODEL_STAGE
              value: "Production"
            - name: TIME_STEPS
              value: "10"
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /live
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: cpu-serving
spec:
  type: NodePort
  selector:
    app: cpu-serving
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30800
