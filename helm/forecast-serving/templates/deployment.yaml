apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "forecast-serving.fullname" . }}
  labels:
    {{- include "forecast-serving.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "forecast-serving.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "forecast-serving.selectorLabels" . | nindent 8 }}
      annotations:
        # Trigger rolling restart when the Secret content changes
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "forecast-serving.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: MLFLOW_TRACKING_URI
              valueFrom:
                secretKeyRef:
                  name: {{ include "forecast-serving.fullname" . }}
                  key: MLFLOW_TRACKING_URI
            - name: MODEL_NAME
              value: {{ .Values.model.name | quote }}
            - name: MODEL_STAGE
              value: {{ .Values.model.stage | quote }}
            - name: TIME_STEPS
              value: {{ .Values.model.timeSteps | quote }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # MLflow writes temp files on model load
            capabilities:
              drop:
                - ALL
