apiVersion: v1
kind: Secret
metadata:
  name: {{ include "forecast-serving.fullname" . }}
  labels:
    {{- include "forecast-serving.labels" . | nindent 4 }}
type: Opaque
stringData:
  # MLflow tracking URI is stored as a Secret rather than a plain ConfigMap env var
  # to support future scenarios where the URI may include credentials.
  MLFLOW_TRACKING_URI: {{ .Values.mlflow.trackingUri | quote }}
