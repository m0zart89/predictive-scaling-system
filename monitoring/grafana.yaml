apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource-provisioning
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus:9090
        access: proxy
        isDefault: true
      - name: Loki
        type: loki
        url: http://loki:3100
        access: proxy
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provisioning
data:
  dashboard.yaml: |
    apiVersion: 1
    providers:
      - name: default
        folder: ''
        type: file
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-json
data:
  cpu-forecasting.json: |
    {
      "title": "CPU Forecasting Service",
      "uid": "afhj0r06ut0xsb",
      "tags": ["mlops"],
      "refresh": "10s",
      "time": {"from": "now-1h", "to": "now"},
      "timepicker": {},
      "panels": [
        {
          "id": 1,
          "title": "Requests per second",
          "type": "timeseries",
          "gridPos": {"x": 0, "y": 0, "w": 12, "h": 8},
          "fieldConfig": {"defaults": {"unit": "reqps"}},
          "targets": [{
            "datasource": "Prometheus",
            "expr": "rate(http_requests_total{job=\"cpu-serving\"}[1m])",
            "legendFormat": "{{handler}} {{method}}"
          }]
        },
        {
          "id": 2,
          "title": "P99 / P50 latency",
          "type": "timeseries",
          "gridPos": {"x": 12, "y": 0, "w": 12, "h": 8},
          "fieldConfig": {"defaults": {"unit": "s"}},
          "targets": [
            {
              "datasource": "Prometheus",
              "expr": "histogram_quantile(0.99, rate(http_request_duration_seconds_bucket{job=\"cpu-serving\"}[1m]))",
              "legendFormat": "p99 {{handler}}"
            },
            {
              "datasource": "Prometheus",
              "expr": "histogram_quantile(0.50, rate(http_request_duration_seconds_bucket{job=\"cpu-serving\"}[1m]))",
              "legendFormat": "p50 {{handler}}"
            }
          ]
        },
        {
          "id": 3,
          "title": "Total /predict requests",
          "type": "stat",
          "gridPos": {"x": 0, "y": 8, "w": 6, "h": 4},
          "fieldConfig": {"defaults": {"unit": "short"}},
          "targets": [{
            "datasource": "Prometheus",
            "expr": "sum(http_requests_total{job=\"cpu-serving\", handler=\"/predict\"})",
            "legendFormat": "/predict calls"
          }]
        },
        {
          "id": 4,
          "title": "Memory usage (RSS)",
          "type": "stat",
          "gridPos": {"x": 6, "y": 8, "w": 6, "h": 4},
          "fieldConfig": {"defaults": {"unit": "bytes"}},
          "targets": [{
            "datasource": "Prometheus",
            "expr": "process_resident_memory_bytes{job=\"cpu-serving\"}",
            "legendFormat": "RSS"
          }]
        },
        {
          "id": 5,
          "title": "Requests by endpoint (total)",
          "type": "bargauge",
          "gridPos": {"x": 12, "y": 8, "w": 12, "h": 4},
          "fieldConfig": {"defaults": {"unit": "short"}},
          "targets": [{
            "datasource": "Prometheus",
            "expr": "http_requests_total{job=\"cpu-serving\"}",
            "legendFormat": "{{handler}}"
          }]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.2
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
          volumeMounts:
            - name: datasource-provisioning
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provisioning
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboard-json
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: datasource-provisioning
          configMap:
            name: grafana-datasource-provisioning
        - name: dashboard-provisioning
          configMap:
            name: grafana-dashboard-provisioning
        - name: dashboard-json
          configMap:
            name: grafana-dashboard-json
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300
